<!-- bloque-02-hero.html — Hero / Banner principal del congreso -->
<section id="congreso-inicio" class="congreso-section congreso-hero">
  <div class="container">
    <div class="congreso-hero__inner">

      <!-- Organizadores -->
      <p class="congreso-hero__eyebrow">
        Universidad del Rosario — Advance Educación Continua &nbsp;|&nbsp; Periso International Academy
      </p>

      <!-- Título principal -->
      <h1 class="congreso-hero__title">
        II Congreso Iberoamericano<br>
        de Terapia Diamagnética y Medicina Regenerativa
      </h1>

      <!-- Subtítulo / tagline -->
      <p class="congreso-hero__subtitle">
        Conocimiento Conectado
      </p>

      <!-- Badges: fecha, modalidad, lugar -->
      <div class="congreso-hero__badges">
        <span class="congreso-hero__badge">
          <!-- Icono calendario -->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true" style="margin-right:0.35em;vertical-align:-2px;">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          30 sept — 3 oct 2026
        </span>
        <span class="congreso-hero__badge">
          <!-- Icono monitor -->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true" style="margin-right:0.35em;vertical-align:-2px;">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
          Presencial + Streaming
        </span>
        <span class="congreso-hero__badge">
          <!-- Icono ubicación -->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true" style="margin-right:0.35em;vertical-align:-2px;">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          Bogotá, Colombia
        </span>
      </div>

      <!-- Llamada a la acción -->
      <div class="congreso-hero__cta">
        <a href="#congreso-formulario" class="congreso-btn-primary">
          Inscríbete ahora
        </a>
        <a href="#congreso-about" class="congreso-btn-outline congreso-btn-outline--white">
          Conoce el congreso
        </a>
      </div>

    </div>
  </div>
</section>
