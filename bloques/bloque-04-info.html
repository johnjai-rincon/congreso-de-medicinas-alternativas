<!-- bloque-04-info.html — Sección "Información del Evento" -->
<section id="congreso-info" class="congreso-section congreso-section--light">
  <div class="container">

    <h2 class="congreso-section-title">Información del Evento</h2>

    <div class="row g-4 justify-content-center">

      <!-- Tarjeta 1: Modalidad -->
      <div class="col-md-6 col-lg-3">
        <div class="congreso-info-card">
          <div class="congreso-info-card__icon">
            <!-- Icono monitor -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
          </div>
          <p class="congreso-info-card__label">Modalidad</p>
          <p class="congreso-info-card__value">Presencial + Streaming</p>
        </div>
      </div>

      <!-- Tarjeta 2: Intensidad -->
      <div class="col-md-6 col-lg-3">
        <div class="congreso-info-card">
          <div class="congreso-info-card__icon">
            <!-- Icono reloj -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <p class="congreso-info-card__label">Intensidad</p>
          <p class="congreso-info-card__value">20 horas congreso</p>
          <p class="congreso-info-card__sub">+ 11 horas precongreso</p>
        </div>
      </div>

      <!-- Tarjeta 3: Certificado -->
      <div class="col-md-6 col-lg-3">
        <div class="congreso-info-card">
          <div class="congreso-info-card__icon">
            <!-- Icono diploma/award -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <circle cx="12" cy="8" r="6"></circle>
              <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"></path>
            </svg>
          </div>
          <p class="congreso-info-card__label">Certificado</p>
          <p class="congreso-info-card__value">Certificado digital PDF</p>
        </div>
      </div>

      <!-- Tarjeta 4: Cupos -->
      <div class="col-md-6 col-lg-3">
        <div class="congreso-info-card">
          <div class="congreso-info-card__icon">
            <!-- Icono usuarios -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </div>
          <p class="congreso-info-card__label">Cupos</p>
          <p class="congreso-info-card__value">500 presenciales</p>
          <p class="congreso-info-card__sub">2.000 virtuales</p>
        </div>
      </div>

    </div>
  </div>
</section>
